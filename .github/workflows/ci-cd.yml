# Ce workflow gère les tests et le déploiement automatique
# Environnements: dev (branches feature/*), test (PR), prod (main)

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check src/ tests/ --ignore E501
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
        env:
          ENVIRONMENT: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  validate-models:
    name: Validate ML Models
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn lightgbm joblib

      - name: Validate models can be loaded
        run: |
          python -c "
          import joblib
          import json
          from pathlib import Path

          models_dir = Path('src/models')

          # Test loading
          energy_model = joblib.load(models_dir / 'energy_model.joblib')
          co2_model = joblib.load(models_dir / 'co2_model.joblib')

          with open(models_dir / 'model_metadata.json') as f:
              metadata = json.load(f)

          print('Energy model loaded:', metadata['energy_model']['algorithm'])
          print('CO2 model loaded:', metadata['co2_model']['algorithm'])
          print('All models validated successfully!')
          "

  deploy-hf:
    name: Deploy to Hugging Face
    runs-on: ubuntu-latest
    needs: [test, validate-models]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git remote add hf https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME} || true
          git lfs install
          git push --force https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME} main

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy-hf
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment status
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ "${{ needs.deploy-hf.result }}" == "success" ]; then
            echo "Deployment successful!"
            echo "App URL: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME }"
          else
            echo "Deployment failed or skipped"
          fi
