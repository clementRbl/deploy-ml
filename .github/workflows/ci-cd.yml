# Ce workflow gère les tests et le déploiement automatique
# Environnements: dev (branches feature/*), test (PR), prod (main)

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - 'feature/**'
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: '3.12'

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with Ruff
        run: |
          pip install ruff
          ruff check src/ tests/ --ignore E501
        continue-on-error: true

      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
        env:
          ENVIRONMENT: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  validate-models:
    name: Validate ML Models Metadata
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Validate model metadata structure
        run: |
          python -c "
          import json
          from pathlib import Path

          # Models are not in Git (included in Docker image only)
          # We only validate the metadata JSON structure here
          models_dir = Path('src/models')
          metadata_path = models_dir / 'model_metadata.json'

          # Validate metadata file exists
          assert metadata_path.exists(), 'model_metadata.json not found'

          # Validate JSON structure
          with open(metadata_path) as f:
              metadata = json.load(f)

          required_models = ['energy_model', 'co2_model']
          required_fields = ['file', 'target', 'algorithm', 'r2_cv',
                           'numeric_features', 'categorical_features']

          for model_key in required_models:
              assert model_key in metadata, f'{model_key} missing from metadata'
              model_info = metadata[model_key]
              for field in required_fields:
                  assert field in model_info, f'{field} missing for {model_key}'

          print('Energy model:', metadata['energy_model']['algorithm'])
          print('CO2 model:', metadata['co2_model']['algorithm'])
          print('Metadata validation successful!')
          print('Note: .joblib files validated at Docker build time')
          "

  deploy-hf:
    name: Deploy to Hugging Face
    runs-on: ubuntu-latest
    needs: [test, validate-models]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create clean deployment with models
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Configure git
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          # Restore model files from first commit (before LFS)
          git checkout 886e641 -- src/models/energy_model.joblib src/models/co2_model.joblib

          # Create orphan branch without history
          git checkout --orphan hf-deploy
          git add -A
          # Force add model files (ignore .gitignore)
          git add -f src/models/*.joblib
          git commit -m "Deploy: Include models in Docker image"

          # Force push to HuggingFace
          git push --force https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME} hf-deploy:main

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy-hf
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Deployment status
        env:
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          if [ "${{ needs.deploy-hf.result }}" == "success" ]; then
            echo "Deployment successful!"
            echo "App URL: https://huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME}"
          else
            echo "Deployment failed or skipped"
          fi
