services:
  db:
    image: postgres:16-alpine
    container_name: deploy_ml_db
    environment:
      POSTGRES_DB: deploy_ml
      POSTGRES_USER: deploy_ml
      POSTGRES_PASSWORD: deploy_ml
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deploy_ml"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
